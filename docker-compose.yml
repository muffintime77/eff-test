services:
  backend:
    container_name: eff-test-backend
    build:
      context: ./backend
    networks:
      - app_net
    env_file:
      .env
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  nginx:
    container_name: eff-test-nginx
    image: nginx:1.26-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      retries: 3
      timeout: 3s
      start_period: 10s 

networks:
  app_net:
    driver: bridge
